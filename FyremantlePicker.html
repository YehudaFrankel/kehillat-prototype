<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeepAliveNow — Your Communities</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }

:root {
  --purple: #6B5CE7;
  --purple-light: #EDE9FC;
  --green: #4CAF7D;
  --green-light: #E8F5EE;
  --amber: #E5A84B;
  --amber-light: #FDF3E0;
  --bg: #F8F7F5;
  --white: #FFFFFF;
  --text: #1A1A1A;
  --text-sec: #6B6B6B;
  --text-muted: #9B9B9B;
  --border: #EEECEC;
  --radius: 12px;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  -webkit-font-smoothing: antialiased;
}

.picker-container {
  width: 100%;
  max-width: 420px;
}

.picker-header {
  text-align: center;
  margin-bottom: 28px;
}

.picker-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--purple);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
  margin: 0 auto 12px;
}

.picker-header h1 {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.picker-header p {
  font-size: 14px;
  color: var(--text-sec);
}

.community-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.community-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .15s;
  text-decoration: none;
  color: inherit;
}

.community-card:hover {
  border-color: var(--purple);
  box-shadow: 0 4px 12px rgba(107,92,231,.1);
  transform: translateY(-1px);
}

.community-card:active {
  transform: scale(.985);
}

.community-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.community-info {
  flex: 1;
  min-width: 0;
}

.community-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}

.community-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.role-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 2px 8px;
  border-radius: 20px;
}

.role-badge.organizer {
  background: var(--purple-light);
  color: var(--purple);
}

.role-badge.member {
  background: var(--green-light);
  color: var(--green);
}

.community-arrow {
  color: var(--text-muted);
  font-size: 18px;
  flex-shrink: 0;
}

.create-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--purple);
  text-decoration: none;
  font-weight: 600;
}

.create-link:hover {
  text-decoration: underline;
}

.picker-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-muted);
}

@media (max-width: 520px) {
  .picker-container { max-width: 100%; }
  .community-card { padding: 14px 16px; }
}
</style>
</head>
<body>

  </div>

    <a href="Fyremantle.html" class="community-card">

  </div>

  <div class="picker-footer">

</div>

</body>
</html>
